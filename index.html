<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fantamondiale</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#0f172a;
    color:white;
    padding:30px;
}

.container{
    max-width:1200px;
    margin:auto;
}

h1{
    text-align:center;
    margin-bottom:30px;
    font-size:3rem;
}

.podium{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
    margin-bottom:30px;
}

.card{
    padding:20px;
    border-radius:16px;
    text-align:center;
    color:black;
    font-weight:bold;
}

.gold{
    background:#FFD700;
}

.silver{
    background:#C0C0C0;
}

.bronze{
    background:#CD7F32;
}

.card .medal{
    font-size:3rem;
}

.table-container{
    overflow-x:auto;
}

table{
    width:100%;
    border-collapse:collapse;
    background:#1e293b;
    border-radius:12px;
    overflow:hidden;
}

thead{
    background:#334155;
}

th,
td{
    padding:14px;
    text-align:center;
}

tbody tr{
    border-bottom:1px solid #334155;
}

tbody tr:hover{
    background:#293548;
}

.green{
    color:#22c55e;
    font-weight:bold;
}

.red{
    color:#ef4444;
    font-weight:bold;
}

.points{
    color:#facc15;
    font-weight:bold;
}

.rank{
    font-weight:bold;
}

.loading{
    text-align:center;
    font-size:1.5rem;
    margin-top:50px;
}
</style>

</head>
<body>

<div class="container">

    <h1>🏆 Fantamondiale</h1>

    <div id="loading" class="loading">
        Caricamento...
    </div>

    <div id="content" style="display:none;">

        <div id="podium" class="podium"></div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Partecipante</th>
                        <th>PG</th>
                        <th>GF</th>
                        <th>GS</th>
                        <th>DR</th>
                        <th>Punti</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>

    </div>

</div>

<script>

async function loadRanking() {

    try {

        const response = await fetch(
            "https://fantamondiale-j1aq.vercel.app/"
        );

        const data = await response.json();

        data.sort((a,b) => {
            if (b.totale !== a.totale) {
                return b.totale - a.totale;
            }
            return b.dr - a.dr;
        });

        createPodium(data);
        createTable(data);

        document.getElementById("loading").style.display = "none";
        document.getElementById("content").style.display = "block";

    } catch(error) {
        document.getElementById("loading").innerHTML =
            "Errore nel caricamento dei dati";
        console.error(error);
    }
}

function createPodium(players){

    const podium = document.getElementById("podium");

    const medals = ["🥇","🥈","🥉"];
    const classes = ["gold","silver","bronze"];

    players.slice(0,3).forEach((player,index)=>{

        podium.innerHTML += `
            <div class="card ${classes[index]}">
                <div class="medal">${medals[index]}</div>
                <h2>${player.participant}</h2>
                <p>${player.totale} punti</p>
                <p>DR ${player.dr > 0 ? '+'+player.dr : player.dr}</p>
            </div>
        `;
    });
}

function createTable(players){

    const tbody = document.getElementById("tableBody");

    players.forEach((player,index)=>{

        const drClass =
            player.dr > 0
            ? "green"
            : player.dr < 0
            ? "red"
            : "";

        tbody.innerHTML += `
            <tr>
                <td class="rank">${index + 1}</td>
                <td>${player.participant}</td>
                <td>${player.pg}</td>
                <td>${player.gf}</td>
                <td>${player.gs}</td>
                <td class="${drClass}">
                    ${player.dr > 0 ? '+'+player.dr : player.dr}
                </td>
                <td class="points">${player.totale}</td>
            </tr>
        `;
    });
}

loadRanking();

</script>

</body>
</html>
