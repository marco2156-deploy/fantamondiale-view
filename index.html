<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fantamondiale</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
/* VARIABILI DI COLORE */
:root {
    --bg-main: #0b1120;
    --bg-sidebar: #131c31;
    --bg-card: #1e293b;
    --bg-hover: #293548;
    --accent: #facc15;
    --text-main: #f8fafc;
    --text-muted: #94a3b8;
    --success: #22c55e;
    --danger: #ef4444;
}

* { 
    margin: 0; 
    padding: 0; 
    box-sizing: border-box; 
    font-family: 'Poppins', sans-serif; 
}

body { 
    background: var(--bg-main); 
    color: var(--text-main); 
    display: flex; 
    height: 100vh; 
    overflow: hidden; 
}

/* LAYOUT: Sidebar */
.sidebar {
    width: 260px;
    background: var(--bg-sidebar);
    padding: 40px 20px;
    display: flex;
    flex-direction: column;
    transition: transform 0.3s ease;
    z-index: 1000;
    box-shadow: 4px 0 15px rgba(0,0,0,0.3);
}

.sidebar h2 { 
    margin-bottom: 40px; 
    text-align: center; 
    color: var(--accent); 
    font-size: 2rem;
    text-transform: uppercase;
    letter-spacing: 2px;
}

.sidebar nav { 
    display: flex; 
    flex-direction: column; 
    gap: 10px; 
}

.sidebar nav button {
    background: transparent; 
    border: 1px solid transparent; 
    color: var(--text-muted); 
    text-align: left;
    padding: 14px 20px; 
    font-size: 1rem; 
    font-weight: 600;
    border-radius: 12px;
    cursor: pointer; 
    transition: all 0.3s ease;
}

.sidebar nav button:hover { 
    background: rgba(255, 255, 255, 0.05); 
    color: var(--text-main);
    transform: translateX(5px);
}

.sidebar nav button.active { 
    background: rgba(250, 204, 21, 0.1); 
    color: var(--accent); 
    border-left: 4px solid var(--accent);
}

/* MAIN CONTENT */
.main-content {
    flex: 1; 
    padding: 50px; 
    overflow-y: auto; 
    position: relative;
    background: linear-gradient(135deg, #0b1120 0%, #0f172a 100%);
}

h1 { 
    text-align: left; 
    margin-bottom: 40px; 
    font-size: 2.5rem; 
    font-weight: 700;
    color: var(--text-main);
    position: relative;
}

h1::after {
    content: '';
    display: block;
    width: 60px;
    height: 4px;
    background: var(--accent);
    margin-top: 10px;
    border-radius: 2px;
}

/* ANIMAZIONI TRANSIZIONE VISTE */
.view { display: none; }
.view.active { 
    display: block; 
    animation: fadeIn 0.5s ease forwards;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(15px); }
    to { opacity: 1; transform: translateY(0); }
}

/* SEZIONE 1: PODIO */
.podium { 
    display: grid; 
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); 
    gap: 25px; 
    margin-bottom: 40px; 
}

.card { 
    padding: 30px 20px; 
    border-radius: 20px; 
    text-align: center; 
    color: #1a1a1a; 
    transition: transform 0.3s, box-shadow 0.3s;
    position: relative;
    overflow: hidden;
}

.card:hover {
    transform: translateY(-8px);
    box-shadow: 0 15px 30px rgba(0,0,0,0.4);
}

.card h2 { font-size: 1.5rem; margin: 15px 0 5px 0; font-weight: 700; }
.card p { font-size: 1.1rem; font-weight: 600; opacity: 0.9; }
.card .medal { font-size: 4rem; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.2)); }

.gold { background: linear-gradient(135deg, #fde047 0%, #eab308 100%); box-shadow: 0 10px 20px rgba(234, 179, 8, 0.2); }
.silver { background: linear-gradient(135deg, #f1f5f9 0%, #cbd5e1 100%); box-shadow: 0 10px 20px rgba(203, 213, 225, 0.2); }
.bronze { background: linear-gradient(135deg, #fed7aa 0%, #d97706 100%); box-shadow: 0 10px 20px rgba(217, 119, 6, 0.2); }

/* SEZIONE 2: SQUADRE PARTECIPANTI */
.teams-grid { 
    display: grid; 
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); 
    gap: 25px; 
}

.team-card { 
    background: var(--bg-card); 
    padding: 25px; 
    border-radius: 16px; 
    box-shadow: 0 10px 20px rgba(0,0,0,0.2);
    border: 1px solid rgba(255,255,255,0.05);
    transition: transform 0.3s;
}

.team-card:hover { transform: translateY(-5px); }

.team-card h3 { 
    color: var(--accent); 
    margin-bottom: 20px; 
    font-size: 1.4rem;
    display: flex;
    align-items: center;
    gap: 10px;
}

.team-card h3::before { content: '👤'; font-size: 1.2rem; }

.team-card ul { list-style: none; }
.team-card li { 
    padding: 10px 0; 
    border-bottom: 1px solid rgba(255,255,255,0.05); 
    color: var(--text-muted);
    font-weight: 400;
    display: flex;
    align-items: center;
}
.team-card li::before { content: '⚽'; margin-right: 10px; font-size: 0.9rem; opacity: 0.7; }
.team-card li:last-child { border-bottom: none; }

/* TABELLE DESKTOP */
.table-container { 
    background: var(--bg-card); 
    border-radius: 16px; 
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
}

table { 
    width: 100%; 
    border-collapse: collapse; 
}

thead { background: rgba(0,0,0,0.2); }

th { 
    padding: 18px 15px; 
    text-align: center; 
    color: var(--text-muted);
    font-weight: 600;
    text-transform: uppercase;
    font-size: 0.85rem;
    letter-spacing: 1px;
}

td { 
    padding: 18px 15px; 
    text-align: center; 
    font-weight: 400;
}

.text-left { text-align: left; padding-left: 30px; font-weight: 600; }

tbody tr { 
    border-bottom: 1px solid rgba(255,255,255,0.03); 
    transition: background 0.2s;
}

tbody tr:nth-child(even) { background: rgba(255,255,255,0.01); }
tbody tr:hover { background: rgba(255,255,255,0.05); }

.green { color: var(--success); font-weight: 600; }
.red { color: var(--danger); font-weight: 600; }
.points { color: var(--accent); font-weight: 700; font-size: 1.1rem; }
.rank { font-weight: 700; color: var(--text-muted); }

/* MOBILE HAMBURGER */
.menu-btn {
    display: none; 
    position: fixed; 
    top: 20px; 
    right: 20px;
    background: var(--accent); 
    color: #000; 
    border: none;
    font-size: 1.5rem; 
    width: 45px;
    height: 45px;
    border-radius: 50%;
    cursor: pointer; 
    z-index: 1001; 
    box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    align-items: center;
    justify-content: center;
}

.loading { 
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center; 
    font-size: 1.2rem; 
    color: var(--text-muted);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 15px;
}

.spinner {
    width: 40px;
    height: 40px;
    border: 4px solid rgba(250, 204, 21, 0.3);
    border-top: 4px solid var(--accent);
    border-radius: 50%;
    animation: spin 1s linear infinite;
}

@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

/* === RESPONSIVE MOBILE: MAGIA PER LE TABELLE === */
@media (max-width: 768px) {
    .menu-btn { display: flex; }
    
    .sidebar { 
        position: fixed; 
        left: 0; 
        top: 0; 
        height: 100%; 
        transform: translateX(-100%); 
        width: 280px; 
    }
    .sidebar.open { transform: translateX(0); }
    
    .main-content { padding: 80px 15px 30px 15px; }
    h1 { font-size: 1.8rem; }
    .podium { gap: 15px; }

    /* Trasforma la tabella in schede (Cards) */
    .table-container { background: transparent; box-shadow: none; }
    table { display: block; width: 100%; }
    thead { display: none; /* Nasconde l'intestazione classica */ }
    tbody { display: block; width: 100%; }
    
    tbody tr { 
        display: block; 
        background: var(--bg-card); 
        margin-bottom: 15px; 
        border-radius: 12px; 
        padding: 10px;
        box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        border: 1px solid rgba(255,255,255,0.05);
    }

    td { 
        display: flex; 
        justify-content: space-between; 
        align-items: center; 
        padding: 10px 15px; 
        text-align: right; 
        border-bottom: 1px solid rgba(255,255,255,0.03); 
    }
    
    td:last-child { border-bottom: none; }
    .text-left { text-align: right; padding-left: 15px; }

    /* Mostra le etichette delle colonne prendendole dall'attributo data-label */
    td::before { 
        content: attr(data-label); 
        font-weight: 600; 
        color: var(--text-muted); 
        text-transform: uppercase; 
        font-size: 0.8rem; 
    }
}
</style>

</head>
<body>

<button class="menu-btn" onclick="toggleMenu()">☰</button>

<aside class="sidebar" id="sidebar">
    <h2>🏆 Fanta</h2>
    <nav>
        <button id="btn-classifica" class="active" onclick="switchView('classifica')">Classifica Generale</button>
        <button id="btn-squadre" onclick="switchView('squadre')">Rose Partecipanti</button>
        <button id="btn-mondiale" onclick="switchView('mondiale')">Statistiche Nazionali</button>
    </nav>
</aside>

<main class="main-content">
    
    <div id="loading" class="loading">
        <div class="spinner"></div>
        Recupero dati in corso...
    </div>

    <div id="view-classifica" class="view">
        <h1>Classifica Generale</h1>
        <div id="podium" class="podium"></div>
        <div class="table-container">
            <table>
                <thead><tr><th>#</th><th>Partecipante</th><th>PG</th><th>GF</th><th>GS</th><th>DR</th><th>Punti</th></tr></thead>
                <tbody id="tableBodyClassifica"></tbody>
            </table>
        </div>
    </div>

    <div id="view-squadre" class="view">
        <h1>Rose Partecipanti</h1>
        <div id="teamsContainer" class="teams-grid"></div>
    </div>

    <div id="view-mondiale" class="view">
        <h1>Statistiche Reali Nazionali</h1>
        <div class="table-container">
            <table>
                <thead><tr><th>#</th><th>Nazionale</th><th>PG</th><th>GF</th><th>GS</th><th>DR</th><th>Punti</th></tr></thead>
                <tbody id="tableBodyMondiale"></tbody>
            </table>
        </div>
    </div>

</main>

<script>
function toggleMenu() {
    document.getElementById("sidebar").classList.toggle("open");
}

function switchView(viewName) {
    document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
    document.querySelectorAll('.sidebar nav button').forEach(el => el.classList.remove('active'));
    
    document.getElementById(`view-${viewName}`).classList.add('active');
    document.getElementById(`btn-${viewName}`).classList.add('active');

    if(window.innerWidth <= 768) {
        document.getElementById("sidebar").classList.remove("open");
    }
}

async function loadData() {
    try {
        const response = await fetch("https://fantamondiale-j1aq.vercel.app/");
        const data = await response.json();

        renderClassificaPartecipanti(data.classifica_partecipanti);
        renderSquadre(data.squadre_partecipanti);
        renderClassificaMondiale(data.classifica_mondiale);

        document.getElementById("loading").style.display = "none";
        document.getElementById("view-classifica").classList.add("active");

    } catch(error) {
        document.getElementById("loading").innerHTML = "Errore nel caricamento dei dati. Riprova più tardi.";
        console.error(error);
    }
}

function renderClassificaPartecipanti(players) {
    const podium = document.getElementById("podium");
    const tbody = document.getElementById("tableBodyClassifica");

    const medals = ["🥇", "🥈", "🥉"];
    const classes = ["gold", "silver", "bronze"];

    players.slice(0, 3).forEach((player, index) => {
        podium.innerHTML += `
            <div class="card ${classes[index]}">
                <div class="medal">${medals[index]}</div>
                <h2>${player.participant}</h2>
                <p>${player.totale} Punti</p>
                <p style="font-size: 0.9rem; margin-top: 5px;">DR ${player.dr > 0 ? '+'+player.dr : player.dr}</p>
            </div>`;
    });

    // Aggiunti attributi data-label ad ogni td
    players.forEach((player, index) => {
        const drClass = player.dr > 0 ? "green" : player.dr < 0 ? "red" : "";
        tbody.innerHTML += `
            <tr>
                <td data-label="#" class="rank">${index + 1}</td>
                <td data-label="Partecipante" style="font-weight: 600;">${player.participant}</td>
                <td data-label="PG">${player.pg}</td>
                <td data-label="GF">${player.gf}</td>
                <td data-label="GS">${player.gs}</td>
                <td data-label="DR" class="${drClass}">${player.dr > 0 ? '+'+player.dr : player.dr}</td>
                <td data-label="Punti" class="points">${player.totale}</td>
            </tr>`;
    });
}

function renderSquadre(participants) {
    const container = document.getElementById("teamsContainer");
    participants.forEach(p => {
        let liTeams = p.teams.map(t => `<li>${t}</li>`).join('');
        container.innerHTML += `
            <div class="team-card">
                <h3>${p.participant}</h3>
                <ul>${liTeams}</ul>
            </div>`;
    });
}

function renderClassificaMondiale(teams) {
    const tbody = document.getElementById("tableBodyMondiale");
    
    // Aggiunti attributi data-label ad ogni td
    teams.forEach((team, index) => {
        const drClass = team.dr > 0 ? "green" : team.dr < 0 ? "red" : "";
        tbody.innerHTML += `
            <tr>
                <td data-label="#" class="rank">${index + 1}</td>
                <td data-label="Nazionale" class="text-left">${team.team}</td>
                <td data-label="PG">${team.pg}</td>
                <td data-label="GF">${team.gf}</td>
                <td data-label="GS">${team.gs}</td>
                <td data-label="DR" class="${drClass}">${team.dr > 0 ? '+'+team.dr : team.dr}</td>
                <td data-label="Punti" class="points">${team.punti}</td>
            </tr>`;
    });
}

loadData();
</script>

</body>
</html>
